<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Formulario Países</title>
    <style>
      body {
        font-family: Arial;
        margin: 40px;
      }
      form {
        width: 320px;
      }
      input,
      select,
      button {
        width: 100%;
        margin-top: 10px;
        padding: 8px;
      }
      .error {
        color: red;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h2>Formulario de Registro</h2>

    <form id="formulario">
      <label>Nombre:</label>
      <input type="text" id="nombre" />
      <div id="errorNombre" class="error"></div>

      <label>Apellido:</label>
      <input type="text" id="lastName" />
      <div id="errorLastName" class="error"></div>

      <label>Email:</label>
      <input type="email" id="email" />
      <div id="errorEmail" class="error"></div>

      <label>Cuenta:</label>
      <input type="text" id="account" />
      <div id="errorAccount" class="error"></div>

      <label>Promedio (avg):</label>
      <input type="number" id="avg" />
      <div id="errorAvg" class="error"></div>

      <label>País:</label>
      <select id="pais">
        <option value="">Seleccione un país</option>
      </select>
      <div id="errorPais" class="error"></div>

      <button type="button" onclick="guardar()">Guardar</button>
      <button type="button" onclick="limpiar()">Limpiar</button>
    </form>

    <script src="script.js"></script>
  </body>
</html>
